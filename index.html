<!DOCTYPE html>
<html>
  <head>
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
  </head>
<body class="body">
  <div class="more-details">
    <img class="more-details__img" src="./eisenhower-matrix.jpg">
    <a class="more-details__info" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
  </div>
  <div class="tasks">
    <p id="add-tasks" class="add-tasks">
      <label for="new-task" class="task-title">Add Item</label>
      <div class="tasks-add__box">
        <input id="new-task" class="task" type="text">
        <button>Add</button>
      </div>
    </p>
    <h3>Todo</h3>
    <ul id="incomplete-tasks" class="tasks-incomplete">
      <li>
        <input type="task-status">
        <label class="task-title">Pay Bills</label>
        <input class="task" type="text">
        <button class="edit-task">Edit</button>
        <button class="delete-task">
          <img src="./remove.svg">
        </button>
      </li>
      <li class="edit-mode">
        <input type="task-status">
        <label class="task-title">Go Shopping</label>
        <input class="task" type="text" value="Go Shopping">
        <button class="edit-task">Save</button>
        <button class="delete-task">
          <img src="./remove.svg">
        </button>
      </li>
    </ul>
    <h3>Completed</h3>
    <ul id="completed-tasks" class="tasks-complete">
      <li>
        <input type="task-status" checked>
        <label class="task-title">See the Doctor</label>
        <input class="task" type="text">
        <button class="edit-task">Edit</button>
        <button class="delete-task">
          <img src="./remove.svg">
        </button>
      </li>
    </ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
